<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #ede8df;
    --card: #fff9f0;
    --ink: #1a1510;
    --muted: #9c9080;
    --border: #d8d0c0;
    --white: #00aa88;
    --pink: #e85d9a;
    --brown: #9b6b3a;
    --accent: #1a1510;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    position: relative;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrap { width: 100%; max-width: 520px; position: relative; z-index: 1; }

  h1 {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 900;
    font-size: 3.2rem;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  /* Waveform display */
  .viz-container {
    background: var(--ink);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  canvas#scope {
    width: 100%;
    height: 80px;
    display: block;
    border-radius: 8px;
  }

  .viz-label {
    position: absolute;
    top: 10px; left: 14px;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* Noise type cards */
  .noise-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .noise-card {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--card);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .noise-card::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.18s;
  }

  .noise-card[data-noise="white"]::after { background: rgba(0,170,136,0.06); }
  .noise-card[data-noise="pink"]::after  { background: rgba(232,93,154,0.06); }
  .noise-card[data-noise="brown"]::after { background: rgba(155,107,58,0.08); }

  .noise-card.active {
    border-color: var(--noise-color, var(--accent));
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--noise-color, var(--accent)) 12%, transparent);
  }

  .noise-card[data-noise="white"] { --noise-color: var(--white); }
  .noise-card[data-noise="pink"]  { --noise-color: var(--pink); }
  .noise-card[data-noise="brown"] { --noise-color: var(--brown); }

  .noise-card.active::after { opacity: 1; }

  .noise-card:hover:not(.active) {
    border-color: var(--muted);
    transform: translateY(-1px);
  }

  .noise-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .noise-card[data-noise="white"] .noise-dot { background: rgba(0,170,136,0.15); }
  .noise-card[data-noise="pink"]  .noise-dot { background: rgba(232,93,154,0.15); }
  .noise-card[data-noise="brown"] .noise-dot { background: rgba(155,107,58,0.15); }

  .noise-dot svg { width: 16px; height: 16px; }

  .noise-card[data-noise="white"] .noise-dot svg { color: var(--white); }
  .noise-card[data-noise="pink"]  .noise-dot svg { color: var(--pink); }
  .noise-card[data-noise="brown"] .noise-dot svg { color: var(--brown); }

  .noise-name {
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: -0.01em;
    display: block;
    margin-bottom: 3px;
  }

  .noise-desc {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1.4;
  }

  /* Controls */
  .controls-grid {
    display: grid;
    gap: 16px;
    margin-bottom: 28px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .control-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 60px;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    outline: none;
    border-radius: 2px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--ink);
    cursor: pointer;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 2px var(--ink);
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .control-val {
    font-size: 0.7rem;
    min-width: 42px;
    text-align: right;
    color: var(--ink);
  }

  /* EQ Toggles */
  .eq-section {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }

  .eq-title {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .eq-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .eq-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .eq-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }

  .eq-btn:hover:not(.active) {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* Play button */
  .play-btn {
    width: 100%;
    padding: 18px;
    font-family: 'Cabinet Grotesk', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .play-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.06) 100%);
  }

  .play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .play-btn:active { transform: translateY(0); }

  .play-btn.playing {
    background: #c8342a;
  }

  .play-icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Timer */
  .timer {
    text-align: center;
    margin-top: 16px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  #timer-val { color: var(--ink); }

  /* Timer presets */
  .timer-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
  }

  .timer-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 5px 10px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .timer-btn:hover { border-color: var(--ink); color: var(--ink); }
  .timer-btn.set { border-color: var(--ink); color: var(--ink); background: rgba(0,0,0,0.05); }
</style>
</head>
<body>
<div class="wrap">

  <h1>Noise<br>Gen</h1>
  <p class="subtitle">Ambient sound generator</p>

  <div class="viz-container">
    <span class="viz-label">Oscilloscope</span>
    <canvas id="scope" width="960" height="160"></canvas>
  </div>

  <div class="noise-cards">
    <div class="noise-card active" data-noise="white" onclick="selectNoise('white')">
      <div class="noise-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12 Q6 4 10 12 Q14 20 18 12 Q22 4 22 12"/></svg>
      </div>
      <span class="noise-name">White</span>
      <span class="noise-desc">All frequencies equal power</span>
    </div>
    <div class="noise-card" data-noise="pink" onclick="selectNoise('pink')">
      <div class="noise-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 14 Q6 8 10 13 Q14 18 18 11 Q22 6 22 10"/></svg>
      </div>
      <span class="noise-name">Pink</span>
      <span class="noise-desc">Bass-rich, natural sounding</span>
    </div>
    <div class="noise-card" data-noise="brown" onclick="selectNoise('brown')">
      <div class="noise-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 16 Q6 14 10 15 Q14 16 18 12 Q20 10 22 11"/></svg>
      </div>
      <span class="noise-name">Brown</span>
      <span class="noise-desc">Deep rumble, like rain</span>
    </div>
  </div>

  <div class="controls-grid">
    <div class="control-row">
      <span class="control-label">Volume</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
      <span class="control-val" id="vol-val">50%</span>
    </div>
    <div class="control-row">
      <span class="control-label">Bass</span>
      <input type="range" id="bass" min="-20" max="20" step="1" value="0">
      <span class="control-val" id="bass-val">0 dB</span>
    </div>
    <div class="control-row">
      <span class="control-label">Treble</span>
      <input type="range" id="treble" min="-20" max="20" step="1" value="0">
      <span class="control-val" id="treble-val">0 dB</span>
    </div>
  </div>

  <div class="eq-section">
    <div class="eq-title">Presets</div>
    <div class="eq-row">
      <button class="eq-btn" data-preset="focus"   onclick="applyPreset(this)">Focus</button>
      <button class="eq-btn" data-preset="sleep"   onclick="applyPreset(this)">Sleep</button>
      <button class="eq-btn" data-preset="rain"    onclick="applyPreset(this)">Rain</button>
      <button class="eq-btn" data-preset="ocean"   onclick="applyPreset(this)">Ocean</button>
      <button class="eq-btn" data-preset="flat"    onclick="applyPreset(this)">Flat</button>
    </div>
  </div>

  <button class="play-btn" id="play-btn" onclick="togglePlay()">
    <span class="play-icon" id="play-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    </span>
    <span id="play-label">Start</span>
  </button>

  <div class="timer">
    <div>Auto-stop: <span id="timer-val">—</span></div>
    <div class="timer-row">
      <button class="timer-btn" data-mins="15"  onclick="setTimer(this)">15 min</button>
      <button class="timer-btn" data-mins="30"  onclick="setTimer(this)">30 min</button>
      <button class="timer-btn" data-mins="60"  onclick="setTimer(this)">1 hr</button>
      <button class="timer-btn" data-mins="0"   onclick="setTimer(this)">Off</button>
    </div>
  </div>

</div>

<script>
let audioCtx = null;
let noiseSource = null;
let gainNode = null;
let bassFilter = null;
let trebleFilter = null;
let analyser = null;
let playing = false;
let currentNoise = 'white';
let timerMs = 0;
let timerEnd = null;
let timerInterval = null;
let animFrame = null;

const canvas = document.getElementById('scope');
const ctx = canvas.getContext('2d');

const NOISE_COLORS = { white: '#00aa88', pink: '#e85d9a', brown: '#9b6b3a' };

const PRESETS = {
  focus: { noise: 'white', volume: 0.45, bass: -4, treble: 2 },
  sleep: { noise: 'brown', volume: 0.55, bass: 8, treble: -10 },
  rain:  { noise: 'pink',  volume: 0.5,  bass: 4, treble: -2 },
  ocean: { noise: 'brown', volume: 0.6,  bass: 10, treble: -6 },
  flat:  { noise: 'white', volume: 0.5,  bass: 0, treble: 0 },
};

function selectNoise(type) {
  currentNoise = type;
  document.querySelectorAll('.noise-card').forEach(c =>
    c.classList.toggle('active', c.dataset.noise === type)
  );
  if (playing) restart();
}

function createNoiseBuffer(type) {
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * 2; // 2-second looping buffer
  const buf = audioCtx.createBuffer(1, length, sampleRate);
  const data = buf.getChannelData(0);

  if (type === 'white') {
    for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;

  } else if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < length; i++) {
      const w = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + w*0.0555179;
      b1 = 0.99332*b1 + w*0.0750759;
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else if (type === 'brown') {
    let last = 0;
    for (let i = 0; i < length; i++) {
      const w = Math.random() * 2 - 1;
      last = (last + 0.02 * w) / 1.02;
      data[i] = last * 3.5;
    }
  }
  return buf;
}

function start() {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.85;

  gainNode = audioCtx.createGain();
  gainNode.gain.value = parseFloat(document.getElementById('volume').value);

  bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = 'lowshelf';
  bassFilter.frequency.value = 200;
  bassFilter.gain.value = parseFloat(document.getElementById('bass').value);

  trebleFilter = audioCtx.createBiquadFilter();
  trebleFilter.type = 'highshelf';
  trebleFilter.frequency.value = 3000;
  trebleFilter.gain.value = parseFloat(document.getElementById('treble').value);

  const buf = createNoiseBuffer(currentNoise);
  noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = buf;
  noiseSource.loop = true;

  noiseSource.connect(gainNode);
  gainNode.connect(bassFilter);
  bassFilter.connect(trebleFilter);
  trebleFilter.connect(analyser);
  analyser.connect(audioCtx.destination);
  noiseSource.start();

  playing = true;
  document.getElementById('play-btn').classList.add('playing');
  document.getElementById('play-label').textContent = 'Stop';
  document.getElementById('play-icon').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="4" width="4" height="16" rx="1"/><rect x="15" y="4" width="4" height="16" rx="1"/></svg>';
  drawScope();
}

function stop() {
  if (noiseSource) { noiseSource.stop(); noiseSource = null; }
  if (audioCtx)    { audioCtx.close(); audioCtx = null; }
  if (animFrame)   { cancelAnimationFrame(animFrame); animFrame = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  playing = false;
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('play-label').textContent = 'Start';
  document.getElementById('play-icon').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
  document.getElementById('timer-val').textContent = timerEnd ? '—' : document.getElementById('timer-val').textContent;
  drawIdleScope();
}

function restart() { if (playing) { stop(); start(); } }

function togglePlay() { playing ? stop() : start(); }

// Waveform scope
function drawScope() {
  if (!analyser) return;
  animFrame = requestAnimationFrame(drawScope);
  const W = canvas.width, H = canvas.height;
  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  const color = NOISE_COLORS[currentNoise];

  ctx.fillStyle = '#1a1510';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(0, H/4*i); ctx.lineTo(W, H/4*i);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;
  for (let i = 0; i < data.length; i++) {
    const x = (i / data.length) * W;
    const y = ((data[i] / 255) * H);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawIdleScope() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#1a1510';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
  ctx.stroke();
}
drawIdleScope();

// Controls
document.getElementById('volume').addEventListener('input', e => {
  document.getElementById('vol-val').textContent = Math.round(e.target.value * 100) + '%';
  if (gainNode) gainNode.gain.value = parseFloat(e.target.value);
});

document.getElementById('bass').addEventListener('input', e => {
  document.getElementById('bass-val').textContent = e.target.value + ' dB';
  if (bassFilter) bassFilter.gain.value = parseFloat(e.target.value);
});

document.getElementById('treble').addEventListener('input', e => {
  document.getElementById('treble-val').textContent = e.target.value + ' dB';
  if (trebleFilter) trebleFilter.gain.value = parseFloat(e.target.value);
});

function setSlider(id, val, displayFn) {
  const el = document.getElementById(id);
  el.value = val;
  el.dispatchEvent(new Event('input'));
}

function applyPreset(btn) {
  document.querySelectorAll('.eq-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const p = PRESETS[btn.dataset.preset];
  selectNoise(p.noise);
  setSlider('volume', p.volume);
  setSlider('bass', p.bass);
  setSlider('treble', p.treble);
}

// Timer
function setTimer(btn) {
  document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('set'));
  const mins = parseInt(btn.dataset.mins);
  if (mins === 0) {
    timerEnd = null;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('timer-val').textContent = '—';
    return;
  }
  btn.classList.add('set');
  timerEnd = Date.now() + mins * 60 * 1000;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!timerEnd) return;
    const rem = timerEnd - Date.now();
    if (rem <= 0) {
      stop();
      document.getElementById('timer-val').textContent = '—';
      timerEnd = null;
      clearInterval(timerInterval);
      return;
    }
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    document.getElementById('timer-val').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}
</script>
</body>
</html>
